name: Cat Clicker

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
          - os: macos-latest
            cc: clang
            cxx: clang++
          - os: windows-latest
            cc: cl
            cxx: cl

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev build-essential cmake

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install sdl2 cmake

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install sdl2 cmake -y

    - name: Create build directory
      run: cmake -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Test build
      run: |
        if [ -f "./build/cat_clicker" ]; then
          echo "✓ Build successful on ${{ matrix.os }}"
        elif [ -f "./build/Release/cat_clicker.exe" ]; then
          echo "✓ Build successful on ${{ matrix.os }}"
        else
          echo "✗ Build failed"
          exit 1
        fi
      shell: bash

  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Check code style
      run: |
        # Install cppcheck
        sudo apt-get install -y cppcheck
        
        # Run static analysis
        cppcheck --enable=all cat_clicker.c --error-exitcode=1 || true

    - name: Count lines of code
      run: |
        wc -l cat_clicker.c
        echo "Total files:"
        find . -name "*.c" -o -name "*.h" | wc -l
